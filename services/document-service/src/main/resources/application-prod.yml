spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.eip.document: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
    com.google.cloud: WARN
