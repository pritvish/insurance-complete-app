server:
  port: 8087

spring:
  application:
    name: document-service
  datasource:
    url: jdbc:postgresql://localhost:5438/document_db
    username: ${DB_USERNAME:eip_user}
    password: ${DB_PASSWORD:eip_pass}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: cg-document
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/insurance/protocol/openid-connect/certs}

document:
  gcs:
    project-id: ${GCS_PROJECT_ID:insurance-platform-project}
    bucket-name: ${GCS_BUCKET_NAME:insurance-documents-bucket}
    credentials-path: ${GCS_CREDENTIALS_PATH:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.eip.document: INFO
