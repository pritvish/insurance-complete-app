server:
  port: 8083

spring:
  application:
    name: premium-calc-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5445}/premium_calc_db
    username: ${DB_USER:premium_calc_user}
    password: ${DB_PASSWORD:premium_calc_pass}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=3600s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.eip.premiumcalc: INFO
