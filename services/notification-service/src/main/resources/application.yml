server:
  port: 8089

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5440/notification_db
    username: ${DB_USERNAME:eip_user}
    password: ${DB_PASSWORD:eip_pass}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: cg-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/insurance/protocol/openid-connect/certs}

notification:
  sendgrid:
    api-key: ${SENDGRID_API_KEY:SG.test-key}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:AC-test}
    auth-token: ${TWILIO_AUTH_TOKEN:test-token}
  email:
    from-address: ${NOTIFICATION_FROM_EMAIL:noreply@insurance-platform.com}
    from-name: Insurance Platform
  sms:
    from-number: ${TWILIO_FROM_NUMBER:+15005550006}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.eip.notification: INFO
