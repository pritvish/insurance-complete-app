# Production profile — overrides application.yml
# All values use env vars; no secrets hardcoded here.

spring:
  datasource:
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    show-sql: false

logging:
  level:
    root: WARN
    com.eip.customer: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
