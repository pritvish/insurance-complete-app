name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
      any_service: ${{ steps.filter.outputs.any_service }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            any_service:
              - 'services/**'
              - 'pom.xml'
            customer-service:
              - 'services/customer-service/**'
              - 'pom.xml'
            policy-service:
              - 'services/policy-service/**'
              - 'pom.xml'
            premium-calc-service:
              - 'services/premium-calc-service/**'
              - 'pom.xml'
            claims-service:
              - 'services/claims-service/**'
              - 'pom.xml'
            payment-service:
              - 'services/payment-service/**'
              - 'pom.xml'
            billing-service:
              - 'services/billing-service/**'
              - 'pom.xml'
            document-service:
              - 'services/document-service/**'
              - 'pom.xml'
            fraud-detection-service:
              - 'services/fraud-detection-service/**'
              - 'pom.xml'
            notification-service:
              - 'services/notification-service/**'
              - 'pom.xml'
            reference-data-service:
              - 'services/reference-data-service/**'
              - 'pom.xml'
            broker-service:
              - 'services/broker-service/**'
              - 'pom.xml'
            audit-service:
              - 'services/audit-service/**'
              - 'pom.xml'
            analytics-service:
              - 'services/analytics-service/**'
              - 'pom.xml'
            workflow-orchestrator:
              - 'services/workflow-orchestrator/**'
              - 'pom.xml'

  # ── Build & test all services ──────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_service == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        run: ./mvnw clean test --no-transfer-progress -T 1C

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ── Code quality ───────────────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.any_service == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: ./mvnw checkstyle:check --no-transfer-progress || true
        # || true — non-blocking until checkstyle rules are fully tuned

  # ── Validate infrastructure files ─────────────────────────────────────────
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose config --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infrastructure/terraform/

      - name: Terraform validate
        run: |
          cd infrastructure/terraform
          terraform init -backend=false
          terraform validate

      - name: Validate Kubernetes manifests (kustomize build)
        run: |
          kubectl kustomize infrastructure/kubernetes/overlays/dev > /dev/null
          kubectl kustomize infrastructure/kubernetes/overlays/staging > /dev/null
          kubectl kustomize infrastructure/kubernetes/overlays/prod > /dev/null
        env:
          KUBECONFIG: /dev/null
