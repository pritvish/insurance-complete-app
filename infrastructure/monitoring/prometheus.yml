global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: eip-local
    env:     development

# ─── Alerting ─────────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ─── Rules ────────────────────────────────────────────────────────────────────
rule_files: []

# ─── Scrape configs ───────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Spring Boot services ────────────────────────────────────────────────────
  - job_name: customer-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['customer-service:8081']
        labels:
          service: customer-service
          tier: tier0

  - job_name: policy-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['policy-service:8082']
        labels:
          service: policy-service
          tier: tier0

  - job_name: premium-calc-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['premium-calc-service:8083']
        labels:
          service: premium-calc-service
          tier: tier1

  - job_name: claims-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['claims-service:8084']
        labels:
          service: claims-service
          tier: tier0

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:8085']
        labels:
