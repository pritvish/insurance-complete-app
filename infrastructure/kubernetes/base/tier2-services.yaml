# ─── document-service ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: document-service
  namespace: ns-tier2
  labels:
    app: document-service
    eip/tier: "2"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: document-service
  template:
    metadata:
      labels:
        app: document-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8087"
    spec:
      serviceAccountName: eip-workload
      containers:
        - name: document-service
          image: gcr.io/PROJECT_ID/document-service:latest
          ports:
            - containerPort: 8087
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: document-db-secret
                  key: url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: document-db-secret
                  key: username
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: document-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: document-db-secret
                  key: password
            - name: GCS_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: gcs-secret
                  key: bucket-name
          envFrom:
            - configMapRef:
                name: kafka-config
            - configMapRef:
                name: keycloak-config
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"   # iText PDF generation is memory-heavy
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: document-service
  namespace: ns-tier2
spec:
  selector:
    app: document-service
  ports:
    - port: 8087
      targetPort: 8087
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: document-service
  namespace: ns-tier2
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: document-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: document-service
  namespace: ns-tier2
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: document-service

