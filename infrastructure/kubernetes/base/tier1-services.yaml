# ─── premium-calc-service ─────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: premium-calc-service
  namespace: ns-tier1
  labels:
    app: premium-calc-service
    eip/tier: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: premium-calc-service
  template:
    metadata:
      labels:
        app: premium-calc-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8083"
    spec:
      serviceAccountName: eip-workload
      containers:
        - name: premium-calc-service
          image: gcr.io/PROJECT_ID/premium-calc-service:latest
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: premiumcalc-db-secret
                  key: url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: premiumcalc-db-secret
                  key: username
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: premiumcalc-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: premiumcalc-db-secret
                  key: password
          envFrom:
            - configMapRef:
                name: kafka-config
            - configMapRef:
                name: keycloak-config
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "1.5Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: premium-calc-service
  namespace: ns-tier1
spec:
  selector:
    app: premium-calc-service
  ports:
    - port: 8083
      targetPort: 8083
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: premium-calc-service
  namespace: ns-tier1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: premium-calc-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: premium-calc-service
  namespace: ns-tier1
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: premium-calc-service

